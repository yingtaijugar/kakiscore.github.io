<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Scorekeeper Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-24">

    <header class="bg-slate-800 p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide text-emerald-400">🏆 ScoreTracker</h1>
        <div class="flex items-center gap-2">
            <select id="langSelect" onchange="changeLanguage()" class="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-emerald-500">
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">简体中文</option>
            </select>
            <button onclick="toggleDataModal()" data-i18n="viewData" class="bg-slate-700 hover:bg-slate-600 text-xs px-2.5 py-1.5 rounded font-medium border border-slate-600 transition">📊 View Data</button>
            <button onclick="downloadExcel()" data-i18n="downloadExcel" class="bg-emerald-600 hover:bg-emerald-500 text-xs px-2.5 py-1.5 rounded font-medium transition shadow">📥 Download Excel</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="trackerTab" class="space-y-6">
            <section class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700 text-center space-y-3">
                <div class="flex justify-center items-center gap-3">
                    <label data-i18n="activeMatch" class="text-sm font-semibold text-slate-400">Active Match:</label>
                    <select id="gameSelect" onchange="loadGame()" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm focus:outline-none focus:border-emerald-500">
                        <option value="Game 1">Game 1</option>
                        <option value="Game 2">Game 2</option>
                        <option value="Game 3">Game 3</option>
                    </select>
                </div>
                
                <div id="clockDisplay" class="text-5xl font-mono font-black tracking-wider text-slate-50 py-2">25:00</div>
                
                <div class="flex justify-center gap-3">
                    <button id="startPauseBtn" onclick="toggleClock()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-6 py-2 rounded-full shadow transition w-32">START</button>
                    <button onclick="resetClock()" data-i18n="resetClock" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-medium px-4 py-2 rounded-full transition text-sm">Reset Clock</button>
                </div>
            </section>

            <section class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-blue-500 shadow-lg text-center flex flex-col justify-between">
                    <div>
                        <h2 id="teamALabel" class="text-md font-bold text-blue-400 truncate">TEAM A</h2>
                        <div id="teamAScoreDisplay" class="text-6xl font-black my-3">0</div>
                    </div>
                    <button onclick="openScoreModal('Team A')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow active:scale-95 transition mt-2">+ GOAL</button>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-red-500 shadow-lg text-center flex flex-col justify-between">
                    <div>
                        <h2 id="teamBLabel" class="text-md font-bold text-red-400 truncate">TEAM B</h2>
                        <div id="teamBScoreDisplay" class="text-6xl font-black my-3">0</div>
                    </div>
                    <button onclick="openScoreModal('Team B')" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-xl shadow active:scale-95 transition mt-2">+ GOAL</button>
                </div>
            </section>

            <section class="bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700">
                <h3 data-i18n="liveTimeline" class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Live Match Timeline</h3>
                <div id="timelineContainer" class="space-y-1 max-h-48 overflow-y-auto font-mono text-xs divide-y divide-slate-700/50"></div>
            </section>
        </div>

        <div id="setupTab" class="hidden space-y-6">
            <section class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700 space-y-5">
                <h2 data-i18n="settingsTitle" class="text-lg font-bold text-emerald-400 border-b border-slate-700 pb-2">Tournament Preferences</h2>
                
                <div class="space-y-2">
                    <label data-i18n="setDuration" class="block text-xs font-bold text-slate-400 uppercase tracking-wide">Default Match Duration (Minutes)</label>
                    <input type="number" id="defaultDurationInput" value="25" min="1" max="180" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:outline-none focus:border-emerald-500 text-sm">
                </div>

                <div class="space-y-4 pt-2">
                    <div class="p-4 bg-slate-900/60 rounded-xl border border-slate-700/60 space-y-3">
                        <div class="flex justify-between items-center">
                            <label data-i18n="teamANameLabel" class="text-xs font-bold text-blue-400 uppercase tracking-wide">Team A Name</label>
                            <span class="text-[10px] text-slate-500 font-mono">ID: A</span>
                        </div>
                        <input type="text" id="teamANameInput" value="Team A" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                        
                        <label data-i18n="rosterLabel" class="block text-[11px] font-semibold text-slate-400 pt-1">Roster Members (Comma-separated)</label>
                        <textarea id="teamARosterInput" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs font-mono focus:outline-none focus:border-blue-500 placeholder-slate-600">Player A1, Player A2, Player A3, Player A4, Player A5, Player A6, Player A7, Player A8, Player A9, Player A10</textarea>
                    </div>

                    <div class="p-4 bg-slate-900/60 rounded-xl border border-slate-700/60 space-y-3">
                        <div class="flex justify-between items-center">
                            <label data-i18n="teamBNameLabel" class="text-xs font-bold text-red-400 uppercase tracking-wide">Team B Name</label>
                            <span class="text-[10px] text-slate-500 font-mono">ID: B</span>
                        </div>
                        <input type="text" id="teamBNameInput" value="Team B" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-red-500">
                        
                        <label data-i18n="rosterLabel" class="block text-[11px] font-semibold text-slate-400 pt-1">Roster Members (Comma-separated)</label>
                        <textarea id="teamBRosterInput" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs font-mono focus:outline-none focus:border-red-500 placeholder-slate-600">Player B1, Player B2, Player B3, Player B4, Player B5, Player B6, Player B7, Player B8, Player B9, Player B10</textarea>
                    </div>
                </div>

                <button onclick="saveConfiguration()" data-i18n="saveConfigBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-xl shadow transition active:scale-[0.98]">
                    Save & Initialize Settings
                </button>
            </section>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-slate-800 border-t border-slate-700 p-2 flex justify-around items-center z-40 max-w-md mx-auto shadow-2xl">
        <button id="navTrackerBtn" onclick="switchTab('tracker')" class="flex flex-col items-center gap-1 py-1 w-1/2 text-emerald-400 font-bold transition">
            <span class="text-xl">⏱️</span>
            <span class="text-xs" data-i18n="tabTracker">Tracker</span>
        </button>
        <button id="navSetupBtn" onclick="switchTab('setup')" class="flex flex-col items-center gap-1 py-1 w-1/2 text-slate-400 font-medium hover:text-slate-200 transition">
            <span class="text-xl">⚙️</span>
            <span class="text-xs" data-i18n="tabSetup">Setup Config</span>
        </button>
    </nav>

    <div id="scoreModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-xs">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl w-full max-w-sm space-y-4 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold text-slate-50">Record Goal</h3>
            <div>
                <label data-i18n="whoScored" class="block text-xs font-bold text-slate-400 mb-1">WHO SCORED?</label>
                <select id="scorerSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:outline-none focus:border-emerald-500"></select>
            </div>
            <div>
                <label data-i18n="whoAssisted" class="block text-xs font-bold text-slate-400 mb-1">WHO ASSISTED?</label>
                <select id="assistSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:outline-none focus:border-emerald-500"></select>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeScoreModal()" data-i18n="cancel" class="w-1/2 bg-slate-700 hover:bg-slate-600 py-2.5 rounded-lg font-medium transition">Cancel</button>
                <button onclick="saveGoalEvent()" data-i18n="confirmGoal" class="w-1/2 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2.5 rounded-lg shadow transition">Confirm Goal</button>
            </div>
        </div>
    </div>

    <div id="dataModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-xs">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 data-i18n="storedDataTitle" class="text-xl font-bold text-slate-50">Stored Tournament Data</h3>
                <button onclick="toggleDataModal()" class="text-slate-400 hover:text-slate-200 text-2xl font-bold">&times;</button>
            </div>
            <div class="overflow-x-auto flex-1 border border-slate-700 rounded-xl bg-slate-900">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-800 text-slate-300 border-b border-slate-700 text-xs font-bold uppercase tracking-wider">
                            <th class="p-3" data-i18n="thMatch">Match</th>
                            <th class="p-3 text-center" id="thTeamA">Team A</th>
                            <th class="p-3 text-center" id="thTeamB">Team B</th>
                            <th class="p-3" data-i18n="thEvents">Match Events / Timeline</th>
                        </tr>
                    </thead>
                    <tbody id="modalTableBody" class="divide-y divide-slate-800 text-slate-300"></tbody>
                </table>
            </div>
            <div class="flex justify-between items-center pt-4 mt-2">
                <button onclick="clearAllData()" data-i18n="clearStorage" class="bg-red-900/40 hover:bg-red-900 text-red-300 text-xs font-medium px-3 py-2 rounded border border-red-700 transition">⚠️ Clear All Storage</button>
                <button onclick="toggleDataModal()" data-i18n="closeWindow" class="bg-slate-700 hover:bg-slate-600 text-sm px-5 py-2 rounded-lg font-medium transition">Close Window</button>
            </div>
        </div>
    </div>

    <script>
